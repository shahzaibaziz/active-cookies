version: "2"
run:
  tests: true
  timeout: 5m
  linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - gocritic
    - gosec
    - errorlint
    - prealloc
    - dupl
  settings:
    text: should have a package comment
    exclusions:
      rules:
      - linters:
      - revive
    formatters:
    enable:
      - gofmt
      - goimports